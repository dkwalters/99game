<!DOCTYPE html>
<html>
<head>
    <title>99 Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #1b5e20; color: white; margin: 0; }
        #login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1b5e20; z-index: 10; padding-top: 50px; }
        .card { display: inline-block; width: 60px; height: 90px; background: white; color: black; border-radius: 5px; margin: 5px; line-height: 90px; font-size: 20px; cursor: pointer; }
        .player-tag { padding: 10px; margin: 5px; display: inline-block; border: 1px solid white; border-radius: 5px; }
        .active-turn { background: gold; color: black; font-weight: bold; }
        .btn { padding: 15px 30px; margin: 10px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login">
    <h1>Who is playing?</h1>
    <button class="btn" onclick="login('Aleigha')">Aleigha</button><br>
    <button class="btn" onclick="login('Mommy')">Mommy</button><br>
    <button class="btn" onclick="login('Daddy')">Daddy</button>
</div>

<div id="game-ui" style="display:none;">
    <h1 id="total-display" style="font-size: 80px; margin: 10px;">0</h1>
    <h2 id="turn-msg">Waiting...</h2>
    <div id="players"></div>
    <hr>
    <h3>Your Hand (<span id="my-name"></span>)</h3>
    <div id="my-hand"></div>
    <br>
    <button onclick="resetGame()">New Round</button>
</div>

<script>
    let myName = "";

    function login(name) {
        myName = name;
        document.getElementById('login').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('my-name').innerText = name;
        updateUI();
    }

    async function updateUI() {
        if (!myName) return;
        const res = await fetch(`/status?user=${myName}`);
        const data = await res.json();
        
        document.getElementById('total-display').innerText = data.currentTotal;
        const current = data.players[data.currentIndex];
        
        document.getElementById('turn-msg').innerText = data.gameOver 
            ? "Game Over!" 
            : (current.name === myName ? "YOUR TURN!" : `${current.name}'s Turn`);

        document.getElementById('players').innerHTML = data.players.map((p, i) => `
            <div class="player-tag ${i === data.currentIndex ? 'active-turn' : ''}">
                ${p.name} ${!p.active ? '(OUT)' : ''}
            </div>
        `).join('');

        // Only show cards if it's your turn and you are active
        const me = data.players.find(p => p.name === myName);
        document.getElementById('my-hand').innerHTML = me.hand.map((c, i) => `
            <div class="card" onclick="play(${i})">${c.display || '?'}</div>
        `).join('');
    }

    async function play(index) {
        await fetch('/play', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ cardIndex: index, userName: myName })
        });
        updateUI();
    }

    async function resetGame() {
        await fetch('/reset', { method: 'POST' });
        updateUI();
    }

    setInterval(updateUI, 2000);
</script>
</body>
</html>
