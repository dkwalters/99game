<!DOCTYPE html>
<html>
<head>
    <title>99 Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1b5e20">
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #1b5e20; color: white; margin: 0; }
        #login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1b5e20; z-index: 200; padding-top: 50px; }
        #display-area { display: flex; align-items: center; justify-content: center; margin: 20px 0; gap: 20px; }
        .card { display: inline-block; width: 65px; height: 95px; background: white; color: black; border-radius: 8px; margin: 5px; line-height: 95px; font-size: 22px; font-weight: bold; cursor: pointer; }
        .mini-card { width: 45px; height: 65px; line-height: 65px; font-size: 16px; cursor: default; }
        .red { color: #d32f2f !important; }
        .player-card { border: 1px solid rgba(255,255,255,0.2); padding: 10px; margin: 5px; border-radius: 10px; display: inline-block; min-width: 90px; }
        .active-turn { background: gold; color: black; box-shadow: 0 0 15px gold; }
        .out { opacity: 0.3; text-decoration: line-through; }
        .btn { padding: 15px 25px; margin: 10px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; font-size: 16px; }
        #ace-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 20px; border-radius: 15px; z-index: 300; }
    </style>
</head>
<body>

<div id="login">
    <h1>99 Game</h1>
    <button id="toggle-btn" class="btn" style="background: #388e3c; color: white;" onclick="togglePlayerCount()">Mode: 3 Players</button>
    <hr style="opacity:0.2; width: 80%;">
    <button class="btn" onclick="login('Aleigha')">Aleigha</button><br>
    <button class="btn" onclick="login('Mommy')">Mommy</button><br>
    <div id="daddy-btn-container">
        <button class="btn" onclick="login('Daddy')">Daddy</button>
    </div>
</div>

<div id="ace-modal">
    <h3>Play Ace as:</h3>
    <button class="btn" style="background: #2e7d32; color: white;" onclick="submitAce(1)">1</button>
    <button class="btn" style="background: #c62828; color: white;" onclick="submitAce(11)">11</button>
</div>

<div id="game-ui" style="display:none;">
    <div id="display-area">
        <div id="last-card-box">
            <div id="last-card-ui"></div>
        </div>
        <h1 id="total-display" style="font-size: 90px; margin: 0;">0</h1>
    </div>
    <h2 id="msg">...</h2>
    <div id="players-row"></div>
    <div id="hand-display" style="margin-top: 20px;"></div>
    <br>
    <button class="btn" onclick="nextRound()" style="background: #388e3c; color: white;">Next Round</button>
    <button class="btn" onclick="newSeason()" style="background: #d32f2f; color: white;">Reset Game</button>
</div>

<script>
    let myName = "";
    let playerMode = 3;
    let pendingAceIndex = null;

    function togglePlayerCount() {
        playerMode = (playerMode === 3) ? 2 : 3;
        document.getElementById('toggle-btn').innerText = `Mode: ${playerMode} Players`;
        document.getElementById('daddy-btn-container').style.display = (playerMode === 2) ? 'none' : 'block';
        fetch(`/set-mode?mode=${playerMode}`, { method: 'POST' });
    }

    function login(name) {
        myName = name;
        document.getElementById('login').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        updateUI();
    }

    async function updateUI() {
        if (!myName) return;
        const res = await fetch('/status');
        const data = await res.json();
        
        document.getElementById('total-display').innerText = data.currentTotal;
        const current = data.players[data.currentIndex];
        document.getElementById('msg').innerText = data.roundOver ? "Round Over!" : (current.name === myName ? "YOUR TURN!" : `${current.name}'s Turn`);

        document.getElementById('players-row').innerHTML = data.players.filter(p => (data.playerMode === 3 || p.name !== "Daddy")).map((p, i) => `
            <div class="player-card ${p.name === current.name ? 'active-turn' : ''} ${p.tokens <= 0 ? 'out' : ''}">
                <b>${p.name}</b><br>Tokens: ${p.tokens}
            </div>
        `).join('');

        const me = data.players.find(p => p.name === myName);
        document.getElementById('hand-display').innerHTML = me.hand.map((c, i) => `
            <div class="card ${c.display.includes('♥') || c.display.includes('♦') ? 'red' : ''}" 
                 onclick="${c.name === 'A' ? `showAceModal(${i})` : `play(${i})`}">${c.display}</div>
        `).join('');
    }

    function showAceModal(idx) { pendingAceIndex = idx; document.getElementById('ace-modal').style.display = 'block'; }
    function submitAce(val) { document.getElementById('ace-modal').style.display = 'none'; play(pendingAceIndex, val); }

    async function play(idx, aceVal = 1) {
        await fetch('/play', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ cardIndex: idx, userName: myName, aceValue: aceVal })
        });
        updateUI();
    }

    async function nextRound() { await fetch('/reset', { method: 'POST' }); updateUI(); }
    async function newSeason() { if(confirm("Reset everything?")) { await fetch('/new-season', { method: 'POST' }); updateUI(); } }
    
    setInterval(updateUI, 2000);
</script>
</body>
</html>
