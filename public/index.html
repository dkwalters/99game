<!DOCTYPE html>
<html>
<head>
    <title>99 Card Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; }
        .card-btn { padding: 15px; margin: 5px; font-size: 18px; cursor: pointer; border-radius: 8px; border: none; background: #007bff; color: white; }
        .danger { background: #dc3545; }
        #status-box { background: white; padding: 20px; border-radius: 15px; display: inline-block; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="status-box">
        <h1>Total: <span id="total">0</span></h1>
        <h3 id="turn-info">Turn: Aleigha</h3>
        <div id="controls">
            <button class="card-btn" onclick="play(1)">+1</button>
            <button class="card-btn" onclick="play(10)">+10</button>
            <button class="card-btn" onclick="play(-10)">-10</button>
            <button class="card-btn" onclick="play(4)">4 (Reverse)</button>
            <button class="card-btn" onclick="play(99)">King (99)</button>
            <button class="card-btn" onclick="play(0)">9 (Pass)</button>
        </div>
        <button class="card-btn danger" onclick="resetGame()" style="margin-top:20px;">Reset Season</button>
    </div>

    <script>
        async function updateUI() {
            const res = await fetch('/status');
            const data = await res.json();
            document.getElementById('total').innerText = data.currentTotal;
            document.getElementById('turn-info').innerText = data.gameOver 
                ? `GAME OVER! ${data.players[data.currentIndex]} lost!` 
                : `Turn: ${data.players[data.currentIndex]}`;
            
            if(data.currentTotal > 90) document.getElementById('total').style.color = 'red';
            else document.getElementById('total').style.color = 'black';
        }

        async function play(val) {
            await fetch('/play', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ value: val })
            });
            updateUI();
        }

        async function resetGame() {
            await fetch('/reset', { method: 'POST' });
            updateUI();
        }

        setInterval(updateUI, 2000); // Auto-refresh every 2 seconds
        updateUI();
    </script>
</body>
</html>
