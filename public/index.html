<!DOCTYPE html>
<html>
<head>
    <title>99 Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #1b5e20; color: white; margin: 0; }
        #login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1b5e20; z-index: 100; padding-top: 50px; }
        .card { display: inline-block; width: 65px; height: 95px; background: white; color: black; border-radius: 8px; margin: 5px; line-height: 95px; font-size: 22px; font-weight: bold; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); cursor: pointer; }
        .player-card { border: 1px solid rgba(255,255,255,0.3); padding: 10px; margin: 5px; border-radius: 10px; display: inline-block; min-width: 100px; }
        .active-turn { background: gold; color: black; border-color: gold; }
        .out-of-round { opacity: 0.5; text-decoration: line-through; }
        .out-of-tokens { background: #000; color: #555; }
        .token { color: gold; font-size: 20px; }
        .btn { padding: 15px 25px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="login">
    <h1>Select Player</h1>
    <button class="btn" onclick="login('Aleigha')">Aleigha</button>
    <button class="btn" onclick="login('Mommy')">Mommy</button>
    <button class="btn" onclick="login('Daddy')">Daddy</button>
</div>

<div id="game-ui" style="display:none;">
    <h1 id="total-display" style="font-size: 80px; margin: 10px;">0</h1>
    <h2 id="msg">...</h2>
    
    <div id="players-row"></div>
    <hr>
    <h3>Your Hand (<span id="player-label"></span>)</h3>
    <div id="hand-display"></div>
    
    <br>
    <button class="btn" onclick="nextRound()" style="background: #2e7d32; color: white;">Next Round</button>
    <button class="btn" onclick="newSeason()" style="background: #c62828; color: white;">Full Reset</button>
</div>

<script>
    let myName = "";

    function login(name) {
        myName = name;
        document.getElementById('login').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('player-label').innerText = name;
        updateUI();
    }

    async function updateUI() {
        if (!myName) return;
        const res = await fetch(`/status?user=${myName}`);
        const data = await res.json();
        
        document.getElementById('total-display').innerText = data.currentTotal;
        const current = data.players[data.currentIndex];

        if (data.roundOver) {
            const winner = data.players.find(p => p.active);
            document.getElementById('msg').innerText = winner ? `Round Over! ${winner.name} Wins!` : "Round Over!";
        } else {
            document.getElementById('msg').innerText = (current.name === myName) ? "YOUR TURN!" : `${current.name}'s Turn`;
        }

        document.getElementById('players-row').innerHTML = data.players.map((p, i) => `
            <div class="player-card ${i === data.currentIndex ? 'active-turn' : ''} ${!p.active ? 'out-of-round' : ''} ${p.tokens <= 0 ? 'out-of-tokens' : ''}">
                <b>${p.name}</b><br>
                <span class="token">${"●".repeat(p.tokens)}</span>
            </div>
        `).join('');

        const me = data.players.find(p => p.name === myName);
        document.getElementById('hand-display').innerHTML = me.hand.map((c, i) => `
            <div class="card" onclick="play(${i})">${c.display || '?'}</div>
        `).join('');
    }

    async function play(idx) {
        await fetch('/play', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ cardIndex: idx, userName: myName })
        });
        updateUI();
    }

    async function nextRound() {
        await fetch('/reset', { method: 'POST' });
        updateUI();
    }

    async function newSeason() {
        if (confirm("Reset everyone to 3 tokens?")) {
            await fetch('/new-season', { method: 'POST' });
            updateUI();
        }
    }

    setInterval(updateUI, 2000);
</script>
</body>
</html>
