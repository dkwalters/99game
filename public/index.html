<!DOCTYPE html>
<html>
<head>
    <title>99 Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #2e7d32; color: white; margin: 0; }
        #login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1b5e20; z-index: 100; padding-top: 50px; }
        .card { display: inline-block; width: 65px; height: 95px; background: white; color: black; border-radius: 8px; margin: 5px; line-height: 95px; font-size: 22px; font-weight: bold; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); cursor: pointer; }
        .player-tag { padding: 10px; margin: 5px; display: inline-block; border: 1px solid white; border-radius: 5px; }
        .active-turn { background: gold; color: black; font-weight: bold; border-color: gold; }
        .out { text-decoration: line-through; opacity: 0.5; }
        .btn { padding: 15px 30px; margin: 10px; font-size: 18px; cursor: pointer; border-radius: 8px; border: none; }
    </style>
</head>
<body>

<div id="login">
    <h1>99 Game: Select Your Name</h1>
    <button class="btn" onclick="login('Aleigha')">Aleigha</button><br>
    <button class="btn" onclick="login('Mommy')">Mommy</button><br>
    <button class="btn" onclick="login('Daddy')">Daddy</button>
</div>

<div id="game-ui" style="display:none;">
    <h1 id="total-display" style="font-size: 80px; margin: 20px 0;">0</h1>
    <h2 id="turn-msg">Waiting...</h2>
    
    <div id="players"></div>
    <hr style="margin: 20px;">
    
    <h3>Your Hand (<span id="my-name-label"></span>)</h3>
    <div id="my-hand"></div>
    
    <br><br>
    <button class="btn" onclick="resetGame()" style="background: #c62828; color: white;">New Round</button>
</div>

<script>
    let myName = "";

    function login(name) {
        myName = name;
        document.getElementById('login').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('my-name-label').innerText = name;
        updateUI();
    }

    async function updateUI() {
        if (!myName) return;
        try {
            const res = await fetch(`/status?user=${myName}`);
            const data = await res.json();
            
            document.getElementById('total-display').innerText = data.currentTotal;
            const current = data.players[data.currentIndex];
            
            if (data.gameOver) {
                const winner = data.players.find(p => p.active);
                document.getElementById('turn-msg').innerText = `GAME OVER! Winner: ${winner ? winner.name : 'None'}`;
            } else {
                document.getElementById('turn-msg').innerText = (current.name === myName) ? "YOUR TURN!" : `${current.name}'s Turn`;
            }

            document.getElementById('players').innerHTML = data.players.map((p, i) => `
                <div class="player-tag ${i === data.currentIndex ? 'active-turn' : ''} ${!p.active ? 'out' : ''}">
                    ${p.name}
                </div>
            `).join('');

            const me = data.players.find(p => p.name === myName);
            document.getElementById('my-hand').innerHTML = me.hand.map((c, i) => `
                <div class="card" onclick="play(${i})">${c.display || '?'}</div>
            `).join('');
            
        } catch (e) { console.log("Update failed"); }
    }

    async function play(index) {
        await fetch('/play', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ cardIndex: index, userName: myName })
        });
        updateUI();
    }

    async function resetGame() {
        if(confirm("Start a new round?")) {
            await fetch('/reset', { method: 'POST' });
            updateUI();
        }
    }

    // Refresh every 2 seconds
    setInterval(updateUI, 2000);
</script>
</body>
</html>
